<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Roads Clone - Infinite Zen Driving</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #d1e2e1; /* Fog/Sky color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; font-weight: 600; letter-spacing: 1px; }
        p { margin: 0; font-size: 16px; opacity: 0.9; }
        .speed { font-size: 32px; font-weight: bold; margin-top: 10px; color: #fff; }
        
        #controls-help {
            position: absolute;
            top: 30px;
            right: 30px;
            color: rgba(255, 255, 255, 0.7);
            text-align: right;
            pointer-events: none;
        }
    </style>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>Endless Road</h1>
        <p>A relaxing infinite drive.</p>
        <div class="speed"><span id="speedDisplay">0</span> km/h</div>
    </div>

    <div id="controls-help">
        <p><b>W / Up</b> : Accelerate</p>
        <p><b>S / Down</b> : Brake / Reverse</p>
        <p><b>A / D</b> : Steer</p>
    </div>

<script>
    // ==========================================
    // 1. SCENE & ENVIRONMENT SETUP
    // ==========================================
    const scene = new THREE.Scene();
    const skyColor = new THREE.Color(0xd1e2e1);
    scene.background = skyColor;
    scene.fog = new THREE.FogExp2(skyColor, 0.0035);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lighting (Sunset/Afternoon vibe)
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xfff0dd, 0.8);
    dirLight.position.set(-100, 150, 50);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -150;
    dirLight.shadow.camera.right = 150;
    dirLight.shadow.camera.top = 150;
    dirLight.shadow.camera.bottom = -150;
    dirLight.shadow.camera.far = 500;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // ==========================================
    // 2. PROCEDURAL MATH & NOISE ENGINE
    // ==========================================
    // Stacked sine waves to create organic, endless noise without needing external libraries
    function noise(x, z) {
        return (Math.sin(x * 0.01 + Math.cos(z * 0.01)) * 15) + 
               (Math.sin(x * 0.003 + z * 0.004) * 45) + 
               (Math.sin(x * 0.05 + z * 0.02) * 2);
    }

    // Calculates the exact center of the endless winding road
    function getRoadCenter(z) {
        let x = Math.sin(z * 0.002) * 300 + Math.sin(z * 0.007) * 80;
        let y = Math.sin(z * 0.0015) * 60 + Math.sin(z * 0.004) * 20;
        return { x, y };
    }

    // Calculates the final terrain height, flattening out a path for the road
    const ROAD_WIDTH = 12;
    const BLEND_WIDTH = 18;

    function getElevation(x, z) {
        let road = getRoadCenter(z);
        let distToRoad = Math.abs(x - road.x);
        let rawTerrainHeight = road.y + noise(x, z);
        
        // Flatten the terrain if it's near the road spine
        if (distToRoad < ROAD_WIDTH) {
            return road.y;
        } else if (distToRoad < ROAD_WIDTH + BLEND_WIDTH) {
            // Smoothly blend the flat road into the wild mountains
            let t = (distToRoad - ROAD_WIDTH) / BLEND_WIDTH;
            t = t * t * (3 - 2 * t); // Smoothstep curve
            return THREE.MathUtils.lerp(road.y, rawTerrainHeight, t);
        }
        return rawTerrainHeight;
    }

    // ==========================================
    // 3. INFINITE TERRAIN GENERATOR
    // ==========================================
    // We use a "Floating Grid" technique. The mesh follows the car, and vertices update based on world coordinates.
    const TERRAIN_SIZE = 600;
    const TERRAIN_RES = 100;
    const terrainGeo = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, TERRAIN_RES, TERRAIN_RES);
    terrainGeo.rotateX(-Math.PI / 2);

    const terrainMat = new THREE.MeshStandardMaterial({ 
        vertexColors: true, 
        flatShading: true, 
        roughness: 0.8 
    });
    const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
    terrainMesh.receiveShadow = true;
    scene.add(terrainMesh);

    const posAttr = terrainGeo.attributes.position;
    const colors = new Float32Array(posAttr.count * 3);
    terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const colAttr = terrainGeo.attributes.color;

    const colorGrass = new THREE.Color(0x5c804b);
    const colorRoad = new THREE.Color(0x3a3d3c);
    const colorLine = new THREE.Color(0xdddddd);
    const colorDirt = new THREE.Color(0x6b5a45);

    let lastGridX = 0;
    let lastGridZ = 0;

    function updateTerrain(carX, carZ) {
        // Only update vertices if the car has moved significantly to save performance
        let snapX = Math.round(carX / 10) * 10;
        let snapZ = Math.round(carZ / 10) * 10;

        if (snapX === lastGridX && snapZ === lastGridZ) return;
        lastGridX = snapX;
        lastGridZ = snapZ;

        terrainMesh.position.set(snapX, 0, snapZ);

        for (let i = 0; i < posAttr.count; i++) {
            // Get local vertex position
            let vx = (i % (TERRAIN_RES + 1)) * (TERRAIN_SIZE / TERRAIN_RES) - (TERRAIN_SIZE / 2);
            let vz = Math.floor(i / (TERRAIN_RES + 1)) * (TERRAIN_SIZE / TERRAIN_RES) - (TERRAIN_SIZE / 2);
            
            // Convert to absolute world position
            let worldX = snapX + vx;
            let worldZ = snapZ + vz;

            let height = getElevation(worldX, worldZ);
            posAttr.setY(i, height);

            // Paint the road and landscape
            let road = getRoadCenter(worldZ);
            let dist = Math.abs(worldX - road.x);
            let finalColor = colorGrass;

            if (dist < ROAD_WIDTH - 0.5) {
                finalColor = colorRoad;
            } else if (dist < ROAD_WIDTH + 0.5) {
                finalColor = colorLine; // White edge lines
            } else if (dist < ROAD_WIDTH + 6) {
                finalColor = colorDirt; // Dirt shoulders
            }

            // Add slight color variation to grass
            if (finalColor === colorGrass && noise(worldX * 2, worldZ * 2) > 0) {
                colAttr.setXYZ(i, finalColor.r * 0.9, finalColor.g * 0.9, finalColor.b * 0.9);
            } else {
                colAttr.setXYZ(i, finalColor.r, finalColor.g, finalColor.b);
            }
        }

        posAttr.needsUpdate = true;
        colAttr.needsUpdate = true;
        terrainGeo.computeVertexNormals();
    }

    // ==========================================
    // 4. INSTANCED TREES (SCENERY)
    // ==========================================
    const TREE_COUNT = 400;
    const treeGeo = new THREE.ConeGeometry(3, 12, 5);
    treeGeo.translate(0, 6, 0); // Anchor at bottom
    const treeMat = new THREE.MeshStandardMaterial({ color: 0x2e4a27, flatShading: true });
    const treeMesh = new THREE.InstancedMesh(treeGeo, treeMat, TREE_COUNT);
    treeMesh.castShadow = true;
    scene.add(treeMesh);

    const treeData = [];
    const dummy = new THREE.Object3D();

    for (let i = 0; i < TREE_COUNT; i++) {
        treeData.push({ x: 0, z: 0, scale: 1 });
    }

    function updateTrees(carX, carZ) {
        let renderRadius = TERRAIN_SIZE / 2.2;
        
        for (let i = 0; i < TREE_COUNT; i++) {
            let t = treeData[i];
            
            // If tree is too far behind or outside radius, respawn it ahead of the car
            if (Math.abs(t.x - carX) > renderRadius || Math.abs(t.z - carZ) > renderRadius) {
                // Spawn in a radius around the car
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * renderRadius;
                t.x = carX + Math.cos(angle) * dist;
                t.z = carZ + Math.sin(angle) * dist;
                t.scale = 0.8 + Math.random() * 0.6;
                
                // Keep trees off the road
                let road = getRoadCenter(t.z);
                if (Math.abs(t.x - road.x) < ROAD_WIDTH + 15) {
                    t.x += (t.x > road.x ? 1 : -1) * 20; // Push away
                }
            }

            // Update instance matrix
            dummy.position.set(t.x, getElevation(t.x, t.z), t.z);
            dummy.scale.set(t.scale, t.scale, t.scale);
            dummy.updateMatrix();
            treeMesh.setMatrixAt(i, dummy.matrix);
        }
        treeMesh.instanceMatrix.needsUpdate = true;
    }

    // ==========================================
    // 5. CAR & PHYSICS
    // ==========================================
    const carGroup = new THREE.Group();
    
    // Simple stylized car body
    const carGeo = new THREE.BoxGeometry(2.2, 1.2, 4.5);
    const carMat = new THREE.MeshStandardMaterial({ color: 0xd94838, roughness: 0.4 });
    const carBody = new THREE.Mesh(carGeo, carMat);
    carBody.position.y = 1;
    carBody.castShadow = true;
    carGroup.add(carBody);
    
    // Windshield
    const glassGeo = new THREE.BoxGeometry(2.0, 0.6, 2.0);
    const glassMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const glass = new THREE.Mesh(glassGeo, glassMat);
    glass.position.set(0, 1.6, -0.5);
    carGroup.add(glass);

    scene.add(carGroup);

    // Driving variables
    let speed = 0;
    let angle = 0; // Rotation around Y axis
    let carX = 0;
    let carZ = 0;

    const MAX_SPEED = 1.2; 
    const ACCEL = 0.005;
    const FRICTION = 0.985;
    const TURN_SPEED = 0.035;

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // Initial positioning
    carZ = -100;
    carX = getRoadCenter(carZ).x;
    updateTerrain(carX, carZ); // Force first terrain generation
    updateTrees(carX, carZ);

    // ==========================================
    // 6. MAIN GAME LOOP
    // ==========================================
    function animate() {
        requestAnimationFrame(animate);

        // Inputs
        let up = keys['w'] || keys['arrowup'];
        let down = keys['s'] || keys['arrowdown'];
        let left = keys['a'] || keys['arrowleft'];
        let right = keys['d'] || keys['arrowright'];

        // Physics
        if (up) speed += ACCEL;
        else if (down) speed -= ACCEL * 1.5; // Brakes
        else speed *= FRICTION; // Coasting

        // Speed caps
        speed = Math.max(-MAX_SPEED / 2, Math.min(speed, MAX_SPEED));

        // Steering (Only turn if moving)
        if (Math.abs(speed) > 0.01) {
            let turnFactor = (speed / MAX_SPEED); // Turn slightly sharper at speed
            if (left) angle += TURN_SPEED * Math.sign(speed);
            if (right) angle -= TURN_SPEED * Math.sign(speed);
        }

        // Apply movement
        // In Three.js, negative Z is "forward"
        carX += Math.sin(angle) * speed;
        carZ += Math.cos(angle) * speed;

        // Ground Alignment Magic (Suspension Simulation)
        // We sample 3 points under the car to calculate exactly how it should tilt on the hills
        let frontZ = carZ + Math.cos(angle) * 2;
        let frontX = carX + Math.sin(angle) * 2;
        let backZ  = carZ - Math.cos(angle) * 2;
        let backX  = carX - Math.sin(angle) * 2;

        let rightZ = carZ - Math.sin(angle) * 1.5;
        let rightX = carX + Math.cos(angle) * 1.5;

        let centerHeight = getElevation(carX, carZ);
        let frontHeight  = getElevation(frontX, frontZ);
        let backHeight   = getElevation(backX, backZ);
        let rightHeight  = getElevation(rightX, rightZ);

        carGroup.position.set(carX, centerHeight, carZ);

        // Calculate pitch and roll based on elevation differences
        let pitch = Math.atan2(frontHeight - backHeight, 4);
        let roll = Math.atan2(centerHeight - rightHeight, 1.5);

        // Apply rotation (Euler order YXZ prevents gimbal lock issues for cars)
        carGroup.rotation.set(-pitch, angle, roll, 'YXZ');

        // Dynamic Camera - Follows loosely and looks slightly ahead
        let camOffsetZ = carZ - Math.cos(angle) * 15;
        let camOffsetX = carX - Math.sin(angle) * 15;
        let camHeight = centerHeight + 6 + (speed * 2); // Camera pulls back/up slightly at speed

        camera.position.lerp(new THREE.Vector3(camOffsetX, camHeight, camOffsetZ), 0.1);
        camera.lookAt(
            carX + Math.sin(angle) * 10, 
            centerHeight + 2, 
            carZ + Math.cos(angle) * 10
        );

        // Off-road slowdown
        let road = getRoadCenter(carZ);
        if (Math.abs(carX - road.x) > ROAD_WIDTH + 2) {
            speed *= 0.96; // Grass friction
        }

        // World Generation Updates
        updateTerrain(carX, carZ);
        updateTrees(carX, carZ);

        // Update UI
        let displaySpeed = Math.abs(speed * 120); // Fake km/h conversion
        document.getElementById('speedDisplay').innerText = Math.floor(displaySpeed);

        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
