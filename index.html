<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Retro Drive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
        }
        h2 { margin: 0 0 10px 0; color: #ff0055; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Retro Drive</h2>
        <p>Controls: WASD or Arrow Keys</p>
        <p>Speed: <span id="speedDisplay">0</span> km/h</p>
        <p>Distance: <span id="distDisplay">0</span> m</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas to fit screen
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Game Variables ---
    const FOV = 100;
    const CAMERA_HEIGHT = 1200;
    const DRAW_DISTANCE = 300;     // How many segments to draw forward
    const SEGMENT_LENGTH = 200;    // Z-length of each road segment
    const ROAD_WIDTH = 2000;       // Width of the road

    let position = 0; // Forward position (Z)
    let playerX = 0;  // Left/Right position (X)
    let speed = 0;
    
    const maxSpeed = 350;
    const accel = 2;
    const breakPower = 5;
    const decel = 1;
    const turnSpeed = 60;

    // Input state
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    // --- Procedural Generation Functions ---
    // Uses sine waves based on the Z position to create endless variations
    function getCurve(z) {
        return Math.sin(z / 15000) * 2.5 + Math.cos(z / 5000) * 1.5;
    }

    function getHill(z) {
        return Math.sin(z / 8000) * 1200 + Math.cos(z / 4000) * 600;
    }

    // Helper to draw a 4-point polygon (used for road segments)
    function drawQuad(color, x1, y1, w1, x2, y2, w2) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x1 - w1, y1);
        ctx.lineTo(x2 - w2, y2);
        ctx.lineTo(x2 + w2, y2);
        ctx.lineTo(x1 + w1, y1);
        ctx.fill();
    }

    // --- Game Logic Update ---
    function update() {
        let up = keys.ArrowUp || keys.w;
        let down = keys.ArrowDown || keys.s;
        let left = keys.ArrowLeft || keys.a;
        let right = keys.ArrowRight || keys.d;

        // Acceleration / Braking
        if (up) speed += accel;
        else if (down) speed -= breakPower;
        else speed -= decel;

        // Cap max and min speed
        speed = Math.max(0, Math.min(speed, maxSpeed));

        // Steering
        let speedPercent = speed / maxSpeed;
        if (left) playerX -= turnSpeed * speedPercent;
        if (right) playerX += turnSpeed * speedPercent;

        // Centrifugal force (pushes you off the road on curves)
        let currentCurve = getCurve(position);
        playerX -= currentCurve * speedPercent * 30;

        // Off-road logic (slow down if player drives onto the grass)
        const limitX = ROAD_WIDTH * 1.2;
        if (playerX < -limitX || playerX > limitX) {
            speed = Math.min(speed, maxSpeed * 0.4); // Grass friction
        }

        // Hard boundary so player can't drive off into the void entirely
        playerX = Math.max(-ROAD_WIDTH * 3, Math.min(playerX, ROAD_WIDTH * 3));

        // Move forward
        position += speed * 15;

        // Update UI
        document.getElementById('speedDisplay').innerText = Math.floor(speed);
        document.getElementById('distDisplay').innerText = Math.floor(position / 1000);
    }

    // --- Rendering ---
    function render() {
        // Clear screen / Draw Sky
        ctx.fillStyle = '#87CEEB'; // Sky blue
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Ground horizon baseline
        ctx.fillStyle = '#10aa10';
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        let startSegment = Math.floor(position / SEGMENT_LENGTH);
        let camZ = position;
        let camY = getHill(camZ) + CAMERA_HEIGHT;

        let dx = 0;   // Curve accumulator
        let ddx = 0;  // Double curve accumulator for smooth bends

        let segmentsToDraw = [];

        // 1. Calculate 3D to 2D projections from front to back
        for (let i = 0; i < DRAW_DISTANCE; i++) {
            let segmentIndex = startSegment + i;
            let worldZ = segmentIndex * SEGMENT_LENGTH;
            let worldY = getHill(worldZ);
            let curve = getCurve(worldZ);

            dx += curve;
            ddx += dx; 

            // Prevent rendering things behind the camera
            let dz = worldZ - camZ;
            if (dz <= 10) continue; 

            let scale = FOV / dz;
            let projX = canvas.width / 2 + ((ddx - playerX) * scale);
            let projY = canvas.height / 2 + ((worldY - camY) * scale);
            let projW = ROAD_WIDTH * scale;

            segmentsToDraw.push({
                x: projX, 
                y: projY, 
                w: projW, 
                index: segmentIndex
            });
        }

        // 2. Draw segments from Back to Front (Painter's Algorithm)
        for (let i = segmentsToDraw.length - 1; i > 0; i--) {
            let p1 = segmentsToDraw[i];     // Further away
            let p2 = segmentsToDraw[i - 1]; // Closer

            // Determine colors to create checkered effect of motion
            let isDark = (p1.index % 6) < 3;
            let grassColor = isDark ? '#10aa10' : '#009a00';
            let rumbleColor = isDark ? '#ffffff' : '#ff0000';
            let roadColor = isDark ? '#666666' : '#606060';
            let lineBorderColor = isDark ? '#ffffff' : '#606060';

            // Draw Grass (fills the width of screen)
            drawQuad(grassColor, canvas.width/2, p1.y, canvas.width, canvas.width/2, p2.y, canvas.width);

            // Draw Rumble strips (curbs)
            drawQuad(rumbleColor, p1.x, p1.y, p1.w * 1.15, p2.x, p2.y, p2.w * 1.15);

            // Draw Road
            drawQuad(roadColor, p1.x, p1.y, p1.w, p2.x, p2.y, p2.w);

            // Draw Center dashed line
            drawQuad(lineBorderColor, p1.x, p1.y, p1.w * 0.05, p2.x, p2.y, p2.w * 0.05);
        }

        drawPlayerCar();
    }

    // Draws a pseudo-3D car using simple 2D shapes
    function drawPlayerCar() {
        let carW = 180;
        let carH = 70;
        let carX = canvas.width / 2 - carW / 2;
        
        // Add a slight bounce when driving
        let bounce = (speed > 10) ? (Math.random() * 4 - 2) : 0;
        
        // Tilt the car based on steering
        let tilt = 0;
        if (keys.ArrowLeft || keys.a) tilt = -5;
        if (keys.ArrowRight || keys.d) tilt = 5;

        let carY = canvas.height - carH - 30 + bounce;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.ellipse(canvas.width / 2, carY + carH + 10, carW / 1.5, 15, 0, 0, Math.PI * 2);
        ctx.fill();

        // Rear Tires
        ctx.fillStyle = '#111';
        ctx.fillRect(carX - 10, carY + 30 + tilt, 35, 45); // Left tire
        ctx.fillRect(carX + carW - 25, carY + 30 - tilt, 35, 45); // Right tire

        // Tail pipes
        ctx.fillStyle = '#444';
        ctx.fillRect(carX + 20, carY + carH, 15, 10);
        ctx.fillRect(carX + carW - 35, carY + carH, 15, 10);

        // Car Body (Red shape)
        ctx.fillStyle = '#cc0000';
        ctx.beginPath();
        ctx.moveTo(carX + 10, carY + carH + tilt);
        ctx.lineTo(carX - 15, carY + 40 + tilt);
        ctx.lineTo(carX + 30, carY + tilt);
        ctx.lineTo(carX + carW - 30, carY - tilt);
        ctx.lineTo(carX + carW + 15, carY + 40 - tilt);
        ctx.lineTo(carX + carW - 10, carY + carH - tilt);
        ctx.fill();

        // License Plate
        ctx.fillStyle = '#fff';
        ctx.fillRect(carX + carW/2 - 20, carY + carH - 15, 40, 15);
        ctx.fillStyle = '#000';
        ctx.font = '10px Arial';
        ctx.fillText("HTML5", carX + carW/2 - 16, carY + carH - 4);

        // Tail Lights
        ctx.fillStyle = (speed > 0 && (keys.ArrowDown || keys.s)) ? '#ffaaaa' : '#990000'; // Light up when braking
        ctx.fillRect(carX - 5, carY + 45 + tilt, 25, 10);
        ctx.fillRect(carX + carW - 20, carY + 45 - tilt, 25, 10);

        // Rear Windshield
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(carX + 35, carY + 5 + tilt);
        ctx.lineTo(carX + 15, carY + 30 + tilt);
        ctx.lineTo(carX + carW - 15, carY + 30 - tilt);
        ctx.lineTo(carX + carW - 35, carY + 5 - tilt);
        ctx.fill();
    }

    // --- Main Game Loop ---
    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    // Start the game
    loop();

</script>
</body>
</html>
