<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Infinite Exponential Drive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky color */
            font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 10;
        }
        h2 { margin: 0 0 10px 0; color: #ffae00; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 18px; font-weight: bold; }
        #speedDisplay { color: #ff0055; font-size: 24px; }
        
        /* Loading Three.js via CDN */
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>3D Open World</h2>
        <p>Controls: WASD or Arrows</p>
        <p>Speed: <span id="speedDisplay">0</span> (Exponential!)</p>
        <p>Coords: X: <span id="xDisplay">0</span> | Z: <span id="zDisplay">0</span></p>
    </div>

<script>
    // --- 1. Basic Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 100, 1500); // Fog to hide chunk loading

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 200, 50);
    scene.add(dirLight);

    // --- 2. Create the Player Car ---
    const car = new THREE.Group();
    
    // Car Body (Red Box)
    const bodyGeo = new THREE.BoxGeometry(4, 2, 8);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.5;
    car.add(body);

    // Car Roof (Dark Box)
    const roofGeo = new THREE.BoxGeometry(3.5, 1.5, 4);
    const roofMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.y = 3;
    roof.position.z = -0.5;
    car.add(roof);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(1, 1, 0.5, 16);
    wheelGeo.rotateZ(Math.PI / 2);
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    
    const wheelPositions = [
        [-2.2, 1, 2.5], [2.2, 1, 2.5],  // Front wheels
        [-2.2, 1, -2.5], [2.2, 1, -2.5] // Rear wheels
    ];
    
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.position.set(...pos);
        car.add(wheel);
    });

    scene.add(car);

    // Attach Camera to Car (Trailing behind)
    const cameraOffset = new THREE.Vector3(0, 7, 15);
    car.add(camera);
    camera.position.copy(cameraOffset);
    camera.lookAt(new THREE.Vector3(0, 2, -10));

    // --- 3. Physics & Controls Variables ---
    let speed = 0;
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // --- 4. Procedural Terrain Generation ---
    const CHUNK_SIZE = 400;
    const RENDER_RADIUS = 2; // How many chunks around the player to render
    const activeChunks = new Map();

    // Reusable geometries/materials for performance
    const groundGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
    groundGeo.rotateX(-Math.PI / 2);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2e8b57 }); // Sea green

    const treeTrunkGeo = new THREE.CylinderGeometry(1, 1, 6);
    const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
    const treeLeavesGeo = new THREE.ConeGeometry(4, 10, 8);
    const treeLeavesMat = new THREE.MeshLambertMaterial({ color: 0x175e17 });
    
    const rockGeo = new THREE.DodecahedronGeometry(2);
    const rockMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

    // Seeded Random Function
    function seededRandom(x, z, offset) {
        let n = Math.sin(x * 12.9898 + z * 78.233 + offset * 45.123) * 43758.5453;
        return n - Math.floor(n);
    }

    // Build a chunk
    function createChunk(cx, cz) {
        const chunk = new THREE.Group();
        chunk.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);

        // Ground Plane
        const ground = new THREE.Mesh(groundGeo, groundMat);
        chunk.add(ground);

        // Generate Random Objects based on chunk coordinates
        const objCount = Math.floor(seededRandom(cx, cz, 0) * 40) + 10;

        for (let i = 0; i < objCount; i++) {
            let px = (seededRandom(cx, cz, i + 1) - 0.5) * CHUNK_SIZE;
            let pz = (seededRandom(cx, cz, i + 2) - 0.5) * CHUNK_SIZE;
            
            // Keep center path slightly clear so player doesn't spawn in a tree
            if (cx === 0 && cz === 0 && Math.abs(px) < 20 && Math.abs(pz) < 20) continue;

            let typeRand = seededRandom(cx, cz, i + 3);

            if (typeRand < 0.6) {
                // Tree
                let trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
                trunk.position.set(px, 3, pz);
                let leaves = new THREE.Mesh(treeLeavesGeo, treeLeavesMat);
                leaves.position.set(px, 10, pz);
                chunk.add(trunk);
                chunk.add(leaves);
            } else {
                // Rock
                let rock = new THREE.Mesh(rockGeo, rockMat);
                let scale = seededRandom(cx, cz, i + 4) * 3 + 1;
                rock.scale.set(scale, scale, scale);
                rock.position.set(px, scale, pz);
                chunk.add(rock);
            }
        }

        scene.add(chunk);
        return chunk;
    }

    // Update Chunks based on player position
    function updateChunks() {
        let currentCx = Math.floor(car.position.x / CHUNK_SIZE);
        let currentCz = Math.floor(car.position.z / CHUNK_SIZE);

        let neededChunks = [];

        // Determine which chunks should be active
        for (let x = -RENDER_RADIUS; x <= RENDER_RADIUS; x++) {
            for (let z = -RENDER_RADIUS; z <= RENDER_RADIUS; z++) {
                let cx = currentCx + x;
                let cz = currentCz + z;
                let key = `${cx},${cz}`;
                neededChunks.push(key);

                if (!activeChunks.has(key)) {
                    activeChunks.set(key, createChunk(cx, cz));
                }
            }
        }

        // Remove chunks that are too far away
        for (let [key, chunk] of activeChunks.entries()) {
            if (!neededChunks.includes(key)) {
                scene.remove(chunk);
                activeChunks.delete(key);
            }
        }
    }

    // --- 5. Main Game Loop ---
    function animate() {
        requestAnimationFrame(animate);

        // --- Physics / Controls ---
        let up = keys['w'] || keys['arrowup'];
        let down = keys['s'] || keys['arrowdown'];
        let left = keys['a'] || keys['arrowleft'];
        let right = keys['d'] || keys['arrowright'];

        // Acceleration (EXPONENTIAL GROWTH)
        if (up) {
            if (speed < 0.5) speed += 0.05;      // Start linear to get moving
            else speed *= 1.02;                  // Multiply exponentially
        } else if (down) {
            speed -= 1;                          // Linear hard braking
        } else {
            speed *= 0.95;                       // Coasting friction
        }

        // No max speed limit! Just prevent accidental reversing from extreme math
        if (speed < 0 && !down) speed = 0;

        // Steering
        if (Math.abs(speed) > 0.1) {
            // Turning is based on speed direction
            let turnRate = 0.04;
            let dir = speed > 0 ? 1 : -1; 
            
            // As speed gets astronomically high, turning gets slightly harder to handle
            let speedFactor = Math.min(Math.abs(speed) * 0.1, 1);

            if (left) car.rotation.y += turnRate * dir * speedFactor;
            if (right) car.rotation.y -= turnRate * dir * speedFactor;
        }

        // Apply Movement (Translate in the direction the car is facing)
        car.translateZ(-speed);

        // --- World Generation ---
        updateChunks();

        // --- UI Updates ---
        // Formatting speed so massive exponential numbers don't break the UI layout
        let displaySpeed = speed > 10000 ? speed.toExponential(2) : Math.floor(speed * 10);
        document.getElementById('speedDisplay').innerText = displaySpeed;
        document.getElementById('xDisplay').innerText = Math.floor(car.position.x);
        document.getElementById('zDisplay').innerText = Math.floor(car.position.z);

        // --- Render ---
        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start loop
    animate();
</script>
</body>
</html>
