<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Infinity Drive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 10;
            min-width: 350px;
        }
        h2 { margin: 0 0 10px 0; color: #ff0055; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 16px; font-weight: bold; }
        .data { color: #00ffff; font-size: 24px; }
        .warning { color: #ffcc00; font-size: 13px; margin-top: 15px;}
        
        #flash {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: white;
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.5s ease-out;
        }

        #double-text {
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 60px;
            font-weight: bold;
            font-style: italic;
            text-shadow: 0 0 30px #00ffff, 0 0 10px #ff0055;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="flash"></div>
    <div id="double-text">EXPONENT DOUBLED!</div>

    <div id="ui">
        <h2>Hyperspace Engine</h2>
        <p>Accelerate: W | Steer: A / D</p>
        <p style="color:#00ff88;">Boost: SHIFT (Double 'e' Exponent)</p>
        <br>
        <p>Speed: <br><span id="speedDisplay" class="data">0 km/h</span></p>
        <p>Distance: <br><span id="distDisplay" class="data">0 m</span></p>
        <p>Coords (X, Z): <br><span id="coordDisplay" class="data">0, 0</span></p>
        <p class="warning">ENGINE CAPPED AT: YOUR RAM CAPACITY</p>
    </div>

<script>
    // ==========================================
    // 1. ABSOLUTE BIG-INT ENGINE 
    // ==========================================
    class BF {
        constructor(m, e) {
            if (m === 0 || isNaN(m) || !isFinite(m)) { this.m = 0; this.e = 0n; return; }
            let adjust = Math.floor(Math.log10(Math.abs(m)));
            this.m = m / Math.pow(10, adjust);
            
            if (typeof e === 'bigint') {
                this.e = e + BigInt(adjust);
            } else {
                this.e = BigInt(Math.floor(e)) + BigInt(adjust);
            }
        }
        static create(val) { return new BF(val, 0n); }
        
        mul(val) { 
            if (val === 0 || this.m === 0) return BF.create(0);
            return new BF(this.m * val, this.e);
        }
        
        add(other) {
            if (this.m === 0) return new BF(other.m, other.e);
            if (other.m === 0) return new BF(this.m, this.e);
            
            let diff = this.e - other.e;
            
            if (diff > 16n) return new BF(this.m, this.e);
            if (diff < -16n) return new BF(other.m, other.e);
            
            let diffNum = Number(diff); 
            let mSum = (this.m * Math.pow(10, diffNum)) + other.m;
            return new BF(mSum, other.e);
        }

        getVisualValue() {
            if (this.m === 0) return 0;
            if (this.e > 3n) return 2000; 
            if (this.e < 0n) return 0;
            return this.m * Math.pow(10, Number(this.e));
        }

        format() {
            if (this.m === 0) return "0";
            if (this.e >= 0n && this.e < 6n) {
                return Math.floor(this.m * Math.pow(10, Number(this.e))).toLocaleString();
            }
            
            let sign = this.m < 0 ? "-" : "";
            let eStr = this.e.toString(); 
            
            // Explicitly format the exponent with commas so you can SEE it doubling
            let eFormatted = eStr.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            
            return sign + Math.abs(this.m).toFixed(2) + "e" + eFormatted;
        }
    }

    // ==========================================
    // 2. SCENE & CAMERA SETUP
    // ==========================================
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.fog = new THREE.FogExp2(0x111122, 0.001);
    scene.background = new THREE.Color(0x111122);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    // ==========================================
    // 3. CAR & PLAYER SETUP
    // ==========================================
    const car = new THREE.Group();
    
    const bodyGeo = new THREE.BoxGeometry(4, 1.5, 9);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0x00ffff });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.25;
    car.add(body);

    const roofGeo = new THREE.BoxGeometry(3.5, 1.2, 4);
    const roofMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(0, 2.6, -1);
    car.add(roof);

    scene.add(car);

    camera.position.set(0, 8, 20);
    camera.lookAt(0, 2, -10);
    car.add(camera);

    // ==========================================
    // 4. INFINITE MATH, PHYSICS & BOOST VARIABLES
    // ==========================================
    let speed = BF.create(0);
    let totalDist = BF.create(0);
    let worldX = BF.create(0);
    let worldZ = BF.create(0);
    let carAngle = 0;

    let lastBoostTime = 0; 
    const BOOST_COOLDOWN = 1; // Milliseconds. Fast enough to spam, slow enough to see.

    let chunkX = 0;
    let chunkZ = 0;
    let localX = 0;
    let localZ = 0;

    const CHUNK_SIZE = 1000;
    const GRID_SIZE = 1;

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // ==========================================
    // 5. PROCEDURAL WORLD GENERATION
    // ==========================================
    const chunks = [];
    const groundGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
    groundGeo.rotateX(-Math.PI / 2);
    
    const groundMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
    const pGeo = new THREE.BoxGeometry(4, 20, 4);
    const pMat = new THREE.MeshLambertMaterial({ color: 0xff0055 });

    function getSeed(x, z, offset) {
        let safeX = (x % 1000000) || 0; 
        let safeZ = (z % 1000000) || 0;
        let n = Math.sin(safeX * 12.9898 + safeZ * 78.233 + offset * 45.123) * 43758.5453;
        return n - Math.floor(n);
    }

    for (let i = 0; i < 9; i++) {
        const group = new THREE.Group();
        scene.add(group);
        chunks.push({ group: group, cx: null, cz: null });
    }

    function updateTreadmill() {
        let chunkIndex = 0;
        for (let dx = -GRID_SIZE; dx <= GRID_SIZE; dx++) {
            for (let dz = -GRID_SIZE; dz <= GRID_SIZE; dz++) {
                
                let targetCx = chunkX + dx;
                let targetCz = chunkZ + dz;
                let chunkObj = chunks[chunkIndex];

                if (chunkObj.cx !== targetCx || chunkObj.cz !== targetCz) {
                    chunkObj.cx = targetCx;
                    chunkObj.cz = targetCz;
                    
                    while(chunkObj.group.children.length > 0) {
                        chunkObj.group.remove(chunkObj.group.children[0]);
                    }

                    const ground = new THREE.Mesh(groundGeo, groundMat);
                    chunkObj.group.add(ground);

                    let objCount = Math.floor(getSeed(targetCx, targetCz, 0) * 10) + 5;
                    for (let i = 0; i < objCount; i++) {
                        let px = (getSeed(targetCx, targetCz, i + 1) - 0.5) * CHUNK_SIZE;
                        let pz = (getSeed(targetCx, targetCz, i + 2) - 0.5) * CHUNK_SIZE;
                        
                        if (targetCx === 0 && targetCz === 0 && Math.abs(px) < 40 && Math.abs(pz) < 40) continue;

                        let pillar = new THREE.Mesh(pGeo, pMat);
                        let heightScale = getSeed(targetCx, targetCz, i + 3) * 5 + 1;
                        pillar.scale.set(1, heightScale, 1);
                        pillar.position.set(px, 10 * heightScale, pz);
                        chunkObj.group.add(pillar);
                    }
                }

                chunkObj.group.position.set((dx * CHUNK_SIZE) - localX, 0, (dz * CHUNK_SIZE) - localZ);
                chunkIndex++;
            }
        }
    }

    // ==========================================
    // 6. MAIN HYPER-LOOP
    // ==========================================
    const flashElement = document.getElementById('flash');
    const doubleTextElement = document.getElementById('double-text');

    function animate() {
        requestAnimationFrame(animate);

        let up = keys['w'] || keys['arrowup'];
        let down = keys['s'] || keys['arrowdown'];
        let left = keys['a'] || keys['arrowleft'];
        let right = keys['d'] || keys['arrowright'];
        let shift = keys['shift'];

        let now = Date.now();

        // SHIFT BOOST LOGIC (DOUBLES THE BIG-INT EXPONENT)
        if (shift && (now - lastBoostTime > BOOST_COOLDOWN)) {
            if (speed.m === 0 || speed.e < 2n) {
                speed = BF.create(100); 
            } else {
                // Here is the magic: the BigInt Exponent is literally multiplied by 2!
                speed = new BF(speed.m, speed.e * 2n); 
            }
            lastBoostTime = now;
            
            // Screen Flash Effect
            flashElement.style.transition = 'none';
            flashElement.style.opacity = '1';
            
            // Giant Double Text Effect
            doubleTextElement.style.transition = 'none';
            doubleTextElement.style.opacity = '1';
            doubleTextElement.style.transform = 'translate(-50%, -50%) scale(1.2)';
            
            setTimeout(() => {
                flashElement.style.transition = 'opacity 0.2s ease-out';
                flashElement.style.opacity = '0';
                
                doubleTextElement.style.transition = 'all 0.5s ease-out';
                doubleTextElement.style.opacity = '0';
                doubleTextElement.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 50);
        }

        // NORMAL ACCELERATION
        if (up) {
            if (speed.m === 0) speed = BF.create(1); 
            else speed = speed.mul(1.08); 
        } else if (down) {
            speed = speed.mul(0.8); 
        } else {
            speed = speed.mul(0.98); 
        }

        if (speed.e < 0n && speed.m < 1) speed = BF.create(0); 

        // Steering
        if (speed.m > 0) {
            let turnRate = 0.04;
            if (left) carAngle += turnRate;
            if (right) carAngle -= turnRate;
            car.rotation.y = carAngle;
        }

        // MATH UPDATES
        totalDist = totalDist.add(speed);
        
        let vxTrue = speed.mul(-Math.sin(carAngle));
        let vzTrue = speed.mul(-Math.cos(carAngle));
        worldX = worldX.add(vxTrue);
        worldZ = worldZ.add(vzTrue);

        // Visual updates
        let renderSpd = speed.getVisualValue();
        localX += renderSpd * -Math.sin(carAngle);
        localZ += renderSpd * -Math.cos(carAngle);

        let cxDiff = Math.floor(localX / CHUNK_SIZE);
        let czDiff = Math.floor(localZ / CHUNK_SIZE);
        chunkX += cxDiff;
        chunkZ += czDiff;
        localX -= cxDiff * CHUNK_SIZE;
        localZ -= czDiff * CHUNK_SIZE;

        // REALITY WARPING VISUAL EFFECTS
        if (speed.e > 3n) {
            let eNum = speed.e > 1000n ? 1000 : Number(speed.e);
            camera.fov = 75 + Math.min(85, eNum * 0.5); 
            camera.updateProjectionMatrix();

            let hue = (Date.now() % 2000) / 2000;
            scene.background.setHSL(hue, 1, 0.1);
            scene.fog.color.setHSL(hue, 1, 0.1);
            groundMat.color.setHSL((hue + 0.5) % 1, 1, 0.5);
            
            car.position.x = (Math.random() - 0.5) * Math.min(2, eNum * 0.1);
        } else {
            camera.fov = 75;
            camera.updateProjectionMatrix();
            scene.background.setHex(0x111122);
            scene.fog.color.setHex(0x111122);
            groundMat.color.setHex(0x00ff88);
            car.position.x = 0;
        }

        updateTreadmill();

        // UPDATE UI
        document.getElementById('speedDisplay').innerText = speed.format() + " km/h";
        document.getElementById('distDisplay').innerText = totalDist.format() + " m";
        document.getElementById('coordDisplay').innerText = `${worldX.format()}, ${worldZ.format()}`;

        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
