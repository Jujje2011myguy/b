<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Open World Drive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #555;
        }
        h2 { margin: 0 0 10px 0; color: #ffae00; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 18px; font-weight: bold; }
        #speedDisplay { color: #ff0055; font-size: 24px; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>Open World Drive</h2>
        <p>Controls: WASD or Arrows</p>
        <p>Speed: <span id="speedDisplay">0</span> km/h</p>
        <p>Coords: X: <span id="xDisplay">0</span> | Y: <span id="yDisplay">0</span></p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Resize canvas
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Player & Camera Variables ---
    let px = 0; // X Coordinate in world
    let py = 0; // Y Coordinate in world
    let angle = 0; // Direction facing (radians)
    let speed = 0; 
    let lastSpeed = 0;

    const FOV = 600; 
    const CAMERA_HEIGHT = 800;
    const CHUNK_SIZE = 4000;
    const DRAW_DISTANCE = 2; // Radius of chunks to draw

    // Physics (No max speed!)
    const accel = 4;
    const brake = 8;
    const turnRate = 0.04;

    // Input state
    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // --- Procedural Generation Logic ---
    // Deterministic random number based on coordinates
    function randomFloat(x, y, i) {
        let n = Math.sin(x * 12.9898 + y * 78.233 + i * 37.719) * 43758.5453;
        return n - Math.floor(n);
    }

    // Generate objects for a specific world chunk
    function getChunkObjects(cx, cy) {
        let objects = [];
        // Determine number of objects in this chunk
        let count = Math.floor(randomFloat(cx, cy, 0) * 150) + 50; 

        for (let i = 1; i <= count; i++) {
            let typeRandom = randomFloat(cx, cy, i);
            let type = 4; // Default: Ground pebble/grass (for speed lines)
            
            if (typeRandom < 0.02) type = 0;      // Tree
            else if (typeRandom < 0.05) type = 1; // Rock
            else if (typeRandom < 0.10) type = 2; // Bush
            else if (typeRandom < 0.15) type = 3; // Cactus

            let localX = randomFloat(cx, cy, i + 0.1) * CHUNK_SIZE;
            let localY = randomFloat(cx, cy, i + 0.2) * CHUNK_SIZE;
            let size = (randomFloat(cx, cy, i + 0.3) * 500) + 300;
            
            if (type === 4) size = 150; // Pebbles are smaller

            objects.push({
                x: (cx * CHUNK_SIZE) + localX,
                y: (cy * CHUNK_SIZE) + localY,
                type: type,
                size: size
            });
        }
        return objects;
    }

    // --- Update Logic ---
    function update() {
        let up = keys['arrowup'] || keys['w'];
        let down = keys['arrowdown'] || keys['s'];
        let left = keys['arrowleft'] || keys['a'];
        let right = keys['arrowright'] || keys['d'];

        // Acceleration & Braking (NO MAX SPEED CAP)
        if (up) speed += accel;
        else if (down) speed -= brake;
        else speed *= 0.98; // Coasting friction

        // Prevent reversing too fast, but allow infinite forward speed
        speed = Math.max(-50, speed); 

        // Steering
        if (left) angle += turnRate;
        if (right) angle -= turnRate;

        // Move Player based on angle
        px += Math.sin(angle) * speed;
        py += Math.cos(angle) * speed;

        // Update UI
        document.getElementById('speedDisplay').innerText = Math.floor(speed);
        document.getElementById('xDisplay').innerText = Math.floor(px);
        document.getElementById('yDisplay').innerText = Math.floor(py);
    }

    // --- Rendering Logic ---
    function render() {
        // 1. Draw Sky
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height / 2);
        gradient.addColorStop(0, '#001d4a');
        gradient.addColorStop(1, '#0088cc');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height / 2);

        // 2. Draw Ground
        ctx.fillStyle = '#1e802a';
        ctx.fillRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        // 3. Find chunks around player
        let currentChunkX = Math.floor(px / CHUNK_SIZE);
        let currentChunkY = Math.floor(py / CHUNK_SIZE);
        
        let objectsToDraw = [];

        // Collect objects from nearby chunks
        for (let cx = currentChunkX - DRAW_DISTANCE; cx <= currentChunkX + DRAW_DISTANCE; cx++) {
            for (let cy = currentChunkY - DRAW_DISTANCE; cy <= currentChunkY + DRAW_DISTANCE; cy++) {
                let chunkObjs = getChunkObjects(cx, cy);
                
                // Project objects to screen space
                for (let obj of chunkObjs) {
                    let dx = obj.x - px;
                    let dy = obj.y - py;

                    // 2D Rotation matrix based on camera angle
                    // rz is depth (Z), rx is horizontal screen space (X)
                    let rz = dy * Math.cos(-angle) - dx * Math.sin(-angle);
                    let rx = dx * Math.cos(-angle) + dy * Math.sin(-angle);

                    // Only render if in front of camera
                    if (rz > 50) {
                        objectsToDraw.push({ obj: obj, rx: rx, rz: rz });
                    }
                }
            }
        }

        // Sort objects by depth (Painter's Algorithm: Furthest first)
        objectsToDraw.sort((a, b) => b.rz - a.rz);

        // 4. Draw Objects
        for (let item of objectsToDraw) {
            let scale = FOV / item.rz;
            let screenX = (canvas.width / 2) + (item.rx * scale);
            let screenY = (canvas.height / 2) + (CAMERA_HEIGHT * scale); // Anchor to ground horizon

            let w = item.obj.size * scale;
            let h = item.obj.size * scale;

            // Cull if offscreen horizontally
            if (screenX < -w || screenX > canvas.width + w || scale > 20) continue;

            drawObject(item.obj.type, screenX, screenY, w, h);
        }

        // 5. Draw Player Car
        drawCar();
    }

    // Helper to draw different procedural items
    function drawObject(type, sx, sy, w, h) {
        if (type === 0) { // Tree
            // Trunk
            ctx.fillStyle = '#5c4033';
            ctx.fillRect(sx - w*0.1, sy - h, w*0.2, h);
            // Leaves
            ctx.fillStyle = '#175e17';
            ctx.beginPath();
            ctx.moveTo(sx, sy - h*1.8);
            ctx.lineTo(sx + w*0.7, sy - h*0.4);
            ctx.lineTo(sx - w*0.7, sy - h*0.4);
            ctx.fill();
        } 
        else if (type === 1) { // Rock
            ctx.fillStyle = '#666';
            ctx.beginPath();
            ctx.arc(sx, sy, w*0.5, Math.PI, 0);
            ctx.fill();
        } 
        else if (type === 2) { // Bush
            ctx.fillStyle = '#104d10';
            ctx.beginPath();
            ctx.arc(sx - w*0.2, sy - h*0.2, w*0.3, 0, Math.PI*2);
            ctx.arc(sx + w*0.2, sy - h*0.3, w*0.4, 0, Math.PI*2);
            ctx.fill();
        }
        else if (type === 3) { // Cactus
            ctx.fillStyle = '#2e8b57';
            ctx.fillRect(sx - w*0.15, sy - h, w*0.3, h); // Main trunk
            ctx.fillRect(sx + w*0.15, sy - h*0.6, w*0.2, w*0.15); // Right arm branch
            ctx.fillRect(sx + w*0.25, sy - h*0.8, w*0.15, h*0.3); // Right arm up
        }
        else if (type === 4) { // Ground details (pebbles/grass patch) to give illusion of speed
            ctx.fillStyle = '#145c1c';
            ctx.beginPath();
            ctx.ellipse(sx, sy, w*0.8, w*0.1, 0, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // Draws the car explicitly from bottom-to-top so it's impossible to be upside down
    function drawCar() {
        let cx = canvas.width / 2;
        let cy = canvas.height - 40; // The absolute bottom of the car on screen
        
        let tilt = 0;
        if (keys['arrowleft'] || keys['a']) tilt = -8;
        if (keys['arrowright'] || keys['d']) tilt = 8;

        // Bounce effect when going fast
        let bounce = (speed > 50) ? (Math.random() * 6 - 3) : 0;
        cy += bounce;

        // Draw Shadow beneath car
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.ellipse(cx, cy, 110, 15, 0, 0, Math.PI * 2);
        ctx.fill();

        // Rear Tires (Drawn touching the ground 'cy')
        ctx.fillStyle = '#111';
        // Left Tire
        ctx.fillRect(cx - 95, cy - 40 + tilt, 35, 40); 
        // Right Tire
        ctx.fillRect(cx + 60, cy - 40 - tilt, 35, 40);

        // Exhaust pipes
        ctx.fillStyle = '#555';
        ctx.fillRect(cx - 55, cy - 15 + tilt, 15, 10);
        ctx.fillRect(cx + 40, cy - 15 - tilt, 15, 10);

        // Main Car Body (Red)
        ctx.fillStyle = '#c00';
        ctx.beginPath();
        ctx.moveTo(cx - 100, cy - 10 + tilt);       // Bottom Left
        ctx.lineTo(cx + 100, cy - 10 - tilt);       // Bottom Right
        ctx.lineTo(cx + 90,  cy - 50 - tilt);       // Middle Right
        ctx.lineTo(cx + 60,  cy - 90 - tilt);       // Roof Right
        ctx.lineTo(cx - 60,  cy - 90 + tilt);       // Roof Left
        ctx.lineTo(cx - 90,  cy - 50 + tilt);       // Middle Left
        ctx.fill();

        // Rear Window
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(cx - 50, cy - 80 + tilt);
        ctx.lineTo(cx + 50, cy - 80 - tilt);
        ctx.lineTo(cx + 80, cy - 50 - tilt);
        ctx.lineTo(cx - 80, cy - 50 + tilt);
        ctx.fill();

        // Tail Lights (Brighten when braking)
        let braking = speed < lastSpeed;
        ctx.fillStyle = braking ? '#ff4444' : '#880000';
        ctx.fillRect(cx - 90, cy - 35 + tilt, 30, 12);
        ctx.fillRect(cx + 60, cy - 35 - tilt, 30, 12);

        // License Plate
        ctx.fillStyle = '#fff';
        ctx.fillRect(cx - 25, cy - 25, 50, 15);
        ctx.fillStyle = '#000';
        ctx.font = '12px Courier';
        ctx.fillText("OPEN", cx - 14, cy - 14);

        lastSpeed = speed;
    }

    // --- Main Game Loop ---
    function loop() {
        update();
        render();
        requestAnimationFrame(loop);
    }

    // Start game
    loop();

</script>
</body>
</html>
