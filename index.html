<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Exponential 3D Drive</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 0px #000;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 10;
        }
        h2 { margin: 0 0 10px 0; color: #00ffff; text-transform: uppercase; letter-spacing: 2px; }
        p { margin: 5px 0; font-size: 18px; font-weight: bold; }
        .highlight { color: #ff0055; font-size: 24px; }
        .distance { color: #00ff88; font-size: 24px; }
    </style>
    <!-- Load Three.js directly via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>Hyperspace Drive</h2>
        <p>Controls: WASD or Arrows</p>
        <p>Speed: <span id="speedDisplay" class="highlight">0</span></p>
        <p>Distance: <span id="distDisplay" class="distance">0</span></p>
        <p style="font-size: 14px; color: #aaa;">(No max speed. Hold W to break reality)</p>
    </div>

<script>
    // --- 1. Basic Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.fog = new THREE.FogExp2(0x87CEEB, 0.0015);
    scene.background = new THREE.Color(0x87CEEB);

    // Lighting
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7);
    hemiLight.position.set(0, 200, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(100, 200, 50);
    scene.add(dirLight);

    // --- 2. Create the Player Car ---
    const car = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.BoxGeometry(4, 1.5, 9);
    const bodyMat = new THREE.MeshLambertMaterial({ color: 0xcc0000 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.25;
    car.add(body);

    // Roof
    const roofGeo = new THREE.BoxGeometry(3.5, 1.2, 4);
    const roofMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(0, 2.6, -1);
    car.add(roof);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.6, 16);
    wheelGeo.rotateZ(Math.PI / 2);
    const wheelMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    
    const wheelPositions = [
        [-2.3, 1.2, 2.5], [2.3, 1.2, 2.5],   // Front
        [-2.3, 1.2, -2.5], [2.3, 1.2, -2.5]  // Rear
    ];
    
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.position.set(...pos);
        car.add(wheel);
    });

    scene.add(car);

    // Camera positioning
    camera.position.set(0, 7, 18);
    camera.lookAt(0, 2, -10);
    car.add(camera);

    // --- 3. Physics & Infinite Math Variables ---
    let speed = 0;
    let totalDistance = 0;
    let carAngle = 0;

    // FLOATING ORIGIN SYSTEM (Prevents IEEE-754 precision crash at 1e20)
    let chunkX = 0; // Integer chunk position
    let chunkZ = 0; // Integer chunk position
    let localX = 0; // Float between 0 and CHUNK_SIZE
    let localZ = 0; // Float between 0 and CHUNK_SIZE

    const CHUNK_SIZE = 800;
    const GRID_SIZE = 1; // Renders a 3x3 grid (1 chunk radius around player)

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

    // --- 4. Procedural Terrain Generation ---
    const chunks = [];
    
    // Shared Geometries & Materials for ultimate performance
    const groundGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
    groundGeo.rotateX(-Math.PI / 2);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2e8b57 });

    const treeTrunkGeo = new THREE.CylinderGeometry(2, 2, 8);
    const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
    const treeLeavesGeo = new THREE.ConeGeometry(6, 15, 8);
    const treeLeavesMat = new THREE.MeshLambertMaterial({ color: 0x175e17 });
    
    const rockGeo = new THREE.DodecahedronGeometry(3);
    const rockMat = new THREE.MeshLambertMaterial({ color: 0x888888 });

    // Custom seeded random that doesn't break at massive numbers
    function getSeed(x, z, offset) {
        // Modulo limits the number so JS Math.sin doesn't output NaN at 1e20
        let safeX = (x % 1000000) || 0; 
        let safeZ = (z % 1000000) || 0;
        let n = Math.sin(safeX * 12.9898 + safeZ * 78.233 + offset * 45.123) * 43758.5453;
        return n - Math.floor(n);
    }

    // Initialize the 9 chunk containers
    for (let i = 0; i < 9; i++) {
        const group = new THREE.Group();
        scene.add(group);
        chunks.push({
            group: group,
            cx: null,
            cz: null
        });
    }

    // Update the treadmill chunks
    function updateTreadmill() {
        let chunkIndex = 0;

        for (let dx = -GRID_SIZE; dx <= GRID_SIZE; dx++) {
            for (let dz = -GRID_SIZE; dz <= GRID_SIZE; dz++) {
                
                let targetCx = chunkX + dx;
                let targetCz = chunkZ + dz;
                let chunkObj = chunks[chunkIndex];

                // If this chunk container represents a new logical area, regenerate its objects
                if (chunkObj.cx !== targetCx || chunkObj.cz !== targetCz) {
                    chunkObj.cx = targetCx;
                    chunkObj.cz = targetCz;
                    
                    // Clear old meshes
                    while(chunkObj.group.children.length > 0) {
                        chunkObj.group.remove(chunkObj.group.children[0]);
                    }

                    // Always add ground
                    const ground = new THREE.Mesh(groundGeo, groundMat);
                    chunkObj.group.add(ground);

                    // Procedurally generate objects
                    let objCount = Math.floor(getSeed(targetCx, targetCz, 0) * 15) + 5;

                    for (let i = 0; i < objCount; i++) {
                        let px = (getSeed(targetCx, targetCz, i + 1) - 0.5) * CHUNK_SIZE;
                        let pz = (getSeed(targetCx, targetCz, i + 2) - 0.5) * CHUNK_SIZE;
                        
                        // Keep the very center slightly clear so player rarely spawns in a rock
                        if (targetCx === 0 && targetCz === 0 && Math.abs(px) < 30 && Math.abs(pz) < 30) continue;

                        let typeRand = getSeed(targetCx, targetCz, i + 3);

                        if (typeRand < 0.5) {
                            let trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
                            trunk.position.set(px, 4, pz);
                            let leaves = new THREE.Mesh(treeLeavesGeo, treeLeavesMat);
                            leaves.position.set(px, 12, pz);
                            chunkObj.group.add(trunk);
                            chunkObj.group.add(leaves);
                        } else {
                            let rock = new THREE.Mesh(rockGeo, rockMat);
                            let scale = getSeed(targetCx, targetCz, i + 4) * 3 + 1;
                            rock.scale.set(scale, scale, scale);
                            rock.position.set(px, scale * 2, pz);
                            chunkObj.group.add(rock);
                        }
                    }
                }

                // Smoothly shift the chunk backwards/forwards based on local floating point position
                // This creates the illusion of seamless movement!
                chunkObj.group.position.set(
                    (dx * CHUNK_SIZE) - localX, 
                    0, 
                    (dz * CHUNK_SIZE) - localZ
                );

                chunkIndex++;
            }
        }
    }

    // --- 5. Helper Functions ---
    // Beautifully formats massive numbers with scientific notation
    function formatMassiveNumber(num) {
        if (num < 10000) return Math.floor(num).toLocaleString();
        return num.toExponential(3).replace('e+', ' x 10^');
    }

    // --- 6. Main Game Loop ---
    function animate() {
        requestAnimationFrame(animate);

        let up = keys['w'] || keys['arrowup'];
        let down = keys['s'] || keys['arrowdown'];
        let left = keys['a'] || keys['arrowleft'];
        let right = keys['d'] || keys['arrowright'];

        // ACCELERATION (Intense Exponential Growth)
        if (up) {
            if (speed < 0.5) speed += 0.05; // Kickstart linear
            else speed *= 1.4;             // 5% growth per frame = insanity
        } else if (down) {
            speed -= 2; // Hard brake
        } else {
            speed *= 0.95; // Coast down
        }

        // Cap reverse speed so the game stays focused on forward hyperspeed
        if (speed < -50) speed = -50;
        if (!down && speed < 0.01 && speed > -0.01) speed = 0;

        // Steering (Car stays at 0,0,0, but we track its logical angle)
        if (Math.abs(speed) > 0.1) {
            let turnRate = 0.05;
            let dir = speed > 0 ? 1 : -1;
            
            // As you reach god-like speeds, steering becomes wildly sensitive
            if (left) carAngle += turnRate * dir;
            if (right) carAngle -= turnRate * dir;
            
            // Visually rotate the car mesh
            car.rotation.y = carAngle;
        }

        // --- THE FLOATING ORIGIN MATH ---
        // Calculate velocity vectors based on angle
        // In Three.js, negative Z is forward
        let vx = -speed * Math.sin(carAngle);
        let vz = -speed * Math.cos(carAngle);

        // Move the logical local position
        localX += vx;
        localZ += vz;

        // If local position exceeds chunk size, increment the massive Chunk ID 
        // and wrap the local position. This keeps floating point errors strictly at 0!
        let cxDiff = Math.floor(localX / CHUNK_SIZE);
        let czDiff = Math.floor(localZ / CHUNK_SIZE);

        chunkX += cxDiff;
        chunkZ += czDiff;
        
        // Wrap local coordinates (localX will ALWAYS remain between 0 and CHUNK_SIZE)
        localX -= cxDiff * CHUNK_SIZE;
        localZ -= czDiff * CHUNK_SIZE;

        totalDistance += Math.abs(speed);

        // --- Visual Hyperspeed Effects ---
        if (speed > 1000) {
            // Warp the FOV based on exponent
            let logSpeed = Math.log10(speed);
            camera.fov = 75 + Math.min(80, logSpeed * 3);
            camera.updateProjectionMatrix();

            // Psychedelic sky/fog shift
            let hue = (logSpeed * 0.1) % 1;
            let psychoColor = new THREE.Color().setHSL(hue, 1.0, 0.5);
            scene.background = psychoColor;
            scene.fog.color = psychoColor;
        } else {
            camera.fov = 75;
            camera.updateProjectionMatrix();
            scene.background.setHex(0x87CEEB);
            scene.fog.color.setHex(0x87CEEB);
        }

        // Render World
        updateTreadmill();

        // Update UI
        document.getElementById('speedDisplay').innerText = formatMassiveNumber(speed) + " km/h";
        document.getElementById('distDisplay').innerText = formatMassiveNumber(totalDistance) + " m";

        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start loop
    animate();
</script>
</body>
</html>
